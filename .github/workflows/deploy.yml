name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1
        with:
          # Serveringiz IP manzili (Secret bo'sh bo'lmasligi kerak)
          host: ${{ secrets.HOST }}
          # Server foydalanuvchi nomi
          username: ${{ secrets.USERNAME }}
          # SSH Private Key (---BEGIN... dan oxirigacha)
          key: ${{ secrets.KEY }}
          # Port (odatda 22)
          port: 22
          # Bajariladigan skript
          script: |
            echo "--- Serverga ulanish muvaffaqiyatli ---"
            whoami
            pwd
            ls -al
            echo "--- Ish tugadi ---"
